services:
  postgres:
    image: postgres:16-alpine
    container_name: trader-postgres
    environment:
      - POSTGRES_DB=trader_db
      - POSTGRES_USER=trader
      - POSTGRES_PASSWORD=trader_password_123
      - TZ=Asia/Tokyo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres_logs:/var/log/postgresql
    command: >
      postgres
      -c logging_collector=on
      -c log_directory=/var/log/postgresql
      -c log_filename=postgresql-%Y-%m-%d.log
      -c log_rotation_age=1d
      -c log_rotation_size=100MB
      -c log_truncate_on_rotation=off
      -c log_statement=all
      -c log_duration=on
      -c log_connections=on
      -c log_disconnections=on
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d trader_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trader-network

  trading-data:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: trading-data
    container_name: trading-data
    ports:
      - "127.0.0.1:8002:8002"
    environment:
      - LOG_LEVEL=info
      - TZ=Asia/Tokyo
      - DATABASE_URL=postgresql+asyncpg://trader:trader_password_123@trader-postgres:5432/trader_db
    env_file:
      - .env
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8002", "--log-level", "info", "--reload"]
    volumes:
      - ./logs:/app/logs
      - ./app:/app/app
      - ./alembic:/app/alembic
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - trader-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# 기동 순서: trading-data → trading-engine
# trading-data가 PostgreSQL과 trader-network를 제공한다.
# cd trading-data  && docker-compose up -d
# cd trading-engine   && docker-compose up -d

volumes:
  postgres_data:
    external: true
    name: trader_postgres_data

networks:
  trader-network:
    external: true
    name: trader-network

