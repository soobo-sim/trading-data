# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: "ko"

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  path_instructions:
    - path: "app/**"
      instructions: |
        데이터 수집 서비스 변경 시 확인:
        - OHLCV 캔들 스키마 변경 여부
        - DB 마이그레이션 누락 여부

chat:
  auto_reply: true
